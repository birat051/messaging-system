openapi: 3.0.3
info:
  title: Ekko API
  version: 0.1.46
  description: |
    **Source of truth** for REST contracts between **web-client** and **messaging-service**
    (single HTTP API; there is no separate notification REST service).

    **Real-time behaviour** — chat, **WebRTC signaling** (1:1), and **in-tab notification events** — uses
    **Socket.IO** on **messaging-service**, not additional REST resources here. **WebRTC** uses inbound events
    **`webrtc:offer`**, **`webrtc:answer`**, **`webrtc:candidate`**, **`webrtc:hangup`** with ack; the server relays to the peer’s
    **`user:<userId>`** room (same **`fromUserId`** / **`callId`** / SDP or ICE fields — **`src/utils/realtime/webrtcSocketHandlers.ts`**).
    Peers must be allowed as direct-messaging pairs (**guest ↔ guest** or **registered ↔ registered** only).
    **STUN** / **TURN** for media connectivity are **not** configured via this REST API — use **web-client** env
    (**`VITE_WEBRTC_*`**, **`getWebRtcIceServers()`**) and **`README.md`** (WebRTC: ports and ICE); optional **coturn**
    in **`infra/docker-compose.yml`** (**`--profile turn`**). The server emits
    **`notification`** with a JSON body discriminated by **`kind`** (`message` \| `call_incoming`);
    see **`docs/PROJECT_PLAN.md`** §8 (and §3.3). The web-client runs
    **`socket.io-client` in a Web Worker** and forwards events to the UI; that is a client
    concern and is not described by this OpenAPI document.

    **Sending chat messages (transport):** the **primary** path is the Socket.IO inbound event
    **`message:send`** with a JSON payload matching **`SendMessageRequest`**; the server ack returns
    **`Message`** or an **`ErrorResponse`**-shaped object (`code`, `message`). This contract is implemented
    in **`messaging-service`** (`src/utils/realtime/socket.ts`) and is **not** expressed as an OpenAPI path
    (WebSocket/Socket.IO framing is out of scope for this file).     **`POST /messages`** below is
    **deprecated** — kept for integration tests, scripts, and tooling; interactive clients should use
    **`message:send`** instead.

    **Receiving new messages (Socket.IO):** after a message is persisted, the server may deliver it on the default
    namespace by emitting **`message:new`** with a JSON body matching **`Message`** (same fields as **`POST /messages`**
    **`201`** / **`message:send`** ack). Clients joined to the per-user room **`user:<userId>`** receive copies routed
    via the broker (`PROJECT_PLAN.md` §3.2); this is not a REST operation and is described here for contract alignment only.
    **Hybrid E2EE envelope** (when used): the same JSON object includes **`body`** (AES-256-GCM ciphertext, base64),
    **`iv`**, **`encryptedMessageKeys`** (`deviceId` → opaque wrapped-key string), and **`algorithm`** (client tag).
    **RabbitMQ** carries that exact JSON (UTF-8) on **`message.user.*`** / **`message.group.*`**; each replica **consumes**
    and **`emit('message:new', …)`** the payload **unchanged** — the server does not decrypt or reinterpret those fields.
    **Logging:** implementations must **not** log **`body`**, **`iv`**, **`encryptedMessageKeys`**, or **`algorithm`**;
    use **`id`**, **`conversationId`**, and routing metadata only (see **`PROJECT_PLAN.md`** §3.2.3).
    For **in-tab toasts**, the server also emits **`notification`** with **`kind: message`** (see **`docs/PROJECT_PLAN.md`** §8.3)
    to the recipient’s **`user:<userId>`** room after **`message:new`** (not for the sender’s **`skipSocketId`** echo).
    **`kind: call_incoming`** is emitted to **`user:<calleeUserId>`** after **`webrtc:offer`** is relayed, via the same
    RabbitMQ topic exchange (**`message.call.user.<calleeUserId>`** routing) as chat (**`docs/PROJECT_PLAN.md`** §8.4).
    **MVP:** the server does not suppress events per-user (no server-side DND); the **web-client** uses **`kind`** to choose
    **alert audio** (e.g. message vs incoming call). **Group** threads (when implemented) may use **`group:<groupId>`** for the same envelope; clients **`join`** that room for group threads.

    All paths below are served under the **`/v1`** prefix (see `servers`). Implementations in
    **messaging-service** must stay aligned; regenerate **`apps/web-client`** types with
    `npm run generate:api`. Routes marked *planned* in summaries are not necessarily wired yet.

    **Users:** `User` includes optional **profile picture** and **status** (short text), plus a unique **`username`**
    (normalized handle) on new accounts.
    At **signup** (`POST /auth/register`), **`email`**, **`password`**, **`username`**, and **`displayName`** are required; **`profilePicture`**
    (URL) and **`status`** are **optional** — avatar URL may come from a prior **`POST /media/upload`**
    if the client uploads before register. **Update profile** — **`PATCH /users/me`** accepts
    **`multipart/form-data`** with an optional **profile image** (`file`) plus optional **`status`** and
    **`displayName`** parts.
    **Search** matches **substring** on **normalized email** and **username** — provide **`q`** or legacy **`email`** query — see `GET /users/search`. **Guest** sessions (**`User.guest === true`**) only see **other guests** in search results; registered accounts never appear.
    **Guest privilege ceiling:** **`PATCH /users/me`**, **`POST /auth/verify-email`**, and **`POST /auth/reset-password`** return **403** **`GUEST_ACTION_FORBIDDEN`** for guest accounts; full signup remains **`POST /auth/register`**.

    **Send message (schema only):** the **`SendMessageRequest`** body shape applies to **`message:send`**
    (Socket.IO) as well as the deprecated **`POST /messages`** route. **`conversationId` is optional**.
    If omitted when starting a direct 1:1 thread, the server **creates** the conversation then the message;
    the client must send **`recipientUserId`**. For subsequent messages in that thread, the client passes
    **`conversationId`** (and omits `recipientUserId`).

    **Pagination:** every list endpoint that supports **`limit`** documents it as **optional** with a
    **server default** (see `LimitQuery`).

    **E2EE device keys:** **`POST /users/me/devices`** registers or updates a **per-device** public key (**`publicKey`**
    or **`pubKey`**, SPKI Base64), optional **`deviceLabel`**, optional **`bootstrap: true`** for a **201** `{ deviceId }`
    response (Feature 13). Server assigns **`deviceId`** when omitted. **`GET /users/me/devices`** lists the caller’s own device rows (**`deviceId`**, label, activity) **and each row’s SPKI `publicKey`** so the trusted device can verify Socket.IO **`device:sync_requested`** payloads against the same listing.
    **`GET /users/{userId}/devices/public-keys`** lists active device keys when the caller
    may fetch them (**`PUBLIC_KEY_FETCH_REQUIRE_DIRECT_THREAD`** in **`README.md`**). New device inserts also emit Socket.IO **`device:sync_requested`**
    on **`user:<userId>`** (see **`POST /users/me/devices`**). **`GET /users/me/sync/message-keys`** batches **`encryptedMessageKeys[deviceId]`**
    for an active registered device (trusted-device re-wrap flow). **`POST /users/me/sync/message-keys`** uploads wrapped keys for **`targetDeviceId`**
    (requires access JWT **`sourceDeviceId`** claim). **`DELETE /users/me/devices/{deviceId}`**
    revokes a device row.
    **Private keys** never appear in this API. **Message `body` (E2EE):** when E2EE is enabled, **`SendMessageRequest.body`**
    and **`Message.body`** may contain **opaque client ciphertext**; the server **never** decrypts. That path **depends on**
    this public-key surface and on the **Prerequisite — User keypair** work in **`docs/TASK_CHECKLIST.md`**.


    **Email verification (env-gated, no `GET /config`):** **`User.emailVerified`** is always returned on **`User`**.
    Whether registration leaves users unverified, whether **`POST /auth/verify-email`** and **`POST /auth/resend-verification`**
    are part of the happy path, and whether **`EMAIL_VERIFICATION_DISABLED`** is returned for those routes when verification
    is off are determined by the **messaging-service** environment variable **`EMAIL_VERIFICATION_REQUIRED`**
    (default **`false`**). See **`README.md`** (Configuration — email verification) and **Feature 2**
    in **`docs/TASK_CHECKLIST.md`**. Clients must not assume a fixed mode; use **`User.emailVerified`**, **`AuthResponse`**, and
    error **`code`** values (e.g. **`EMAIL_VERIFICATION_DISABLED`**) from responses.

servers:
  - url: /v1
    description: API version 1 (relative to messaging-service origin)

tags:
  - name: System
    description: Liveness and readiness
  - name: Auth
    description: Registration, login, tokens
  - name: Users
    description: Profiles, search, public keys
  - name: Conversations
    description: Direct and group threads
  - name: Messages
    description: Send and list messages
  - name: Groups
    description: Group lifecycle and membership
  - name: Contacts
    description: Contact lists and requests
  - name: Media
    description: Uploads via messaging-service (AWS SDK → S3)
  - name: 'Device sync (Feature 13)'
    description: |
      Per-device E2EE registry and multi-device key sync (**`docs/TASK_CHECKLIST.md`** §A). REST paths under **`/users/me/devices`**
      and **`/users/me/sync/message-keys`**, plus **`GET /users/{userId}/devices/public-keys`** for participant directory reads.
      After a **new** device row is inserted, messaging-service emits Socket.IO **`device:sync_requested`** on **`user:<userId>`**
      (not modeled as an OpenAPI operation). Canonical wire schemas include **`DeviceListResponse`**, **`SyncMessageKeyEntry`**, and **`BatchKeyUploadRequest`**.

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness — process is up (no dependency checks)
      tags:
        - System
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      operationId: getReady
      summary: Readiness — dependencies satisfied for serving traffic
      tags:
        - System
      responses:
        '200':
          description: Ready to accept traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready (dependencies unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user (Argon2 password hash; optional profilePicture and status)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: >-
            Created. **`accessToken`** is **`null`** when **`emailVerified`** is false (email verification required);
            use **`POST /auth/verify-email`** then **`accessToken`** is returned there, or sign in with **`POST /auth/login`** after verification.
            When verification is not required, an access token is returned immediately.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: >-
            Conflict — email already registered (**`EMAIL_ALREADY_REGISTERED`**) or username taken (**`USERNAME_TAKEN`**).
            Check **`code`** in **`ErrorResponse`**.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many registration attempts from this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured (e.g. missing JWT_SECRET)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify email using signed JWT from registration or resend (throttled per IP)
      description: |
        When **`EMAIL_VERIFICATION_REQUIRED`** is **`false`** on the server, returns **400** with **`ErrorResponse`**
        **`code`** **`EMAIL_VERIFICATION_DISABLED`** — the verification flow is not used (see **`README.md`** (Configuration section)).
        If the token resolves to a **guest** account, returns **403** **`GUEST_ACTION_FORBIDDEN`**.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified (or already verified) — includes **`accessToken`** for the verified session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Guest account — email verification not applicable (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many verification attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/resend-verification:
    post:
      operationId: resendVerificationEmail
      summary: Resend verification flow (throttled per email; constant response to avoid enumeration)
      description: |
        When **`EMAIL_VERIFICATION_REQUIRED`** is **`false`**, returns **400** with **`code`** **`EMAIL_VERIFICATION_DISABLED`**.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '200':
          description: >-
            Request accepted (always ok true in body whether or not an unverified user existed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendVerificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Too many resend requests for this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/guest:
    post:
      operationId: createGuestSession
      summary: Create a guest session (planned — not yet implemented when enabled)
      description: |
        **On/off** is controlled by **`guestSessionsEnabled`** in MongoDB **`system_config`** (singleton), merged with env
        **`GUEST_SESSIONS_ENABLED`** via effective runtime config (see **`README.md`** — Runtime configuration). When disabled,
        returns **403** with **`code`** **`GUEST_SESSIONS_DISABLED`** before body validation. When enabled, creates a guest **`User`** row (no email; optional MongoDB TTL via **`guestDataExpiresAt`** when **`guestDataTtlEnabled`** is true in **`system_config`** / env).

        **Rate limits (Redis):** per client IP (**`GUEST_AUTH_RATE_LIMIT_*`**); when **`X-Client-Fingerprint`** is sent, an additional
        per-fingerprint bucket applies so one IP cannot rotate unlimited guest identities and one fingerprint cannot bypass IP caps alone.

        Success body is **`GuestAuthResponse`**: tokens, **`user`** with **`guest: true`**, **`expiresIn`** (seconds),
        and **`expiresAt`** (ISO 8601 absolute access expiry). Access JWT payload includes **`guest: true`**. Guest sessions use
        **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** and **`GUEST_REFRESH_TOKEN_TTL_SECONDS`** (see **`README.md`** — Configuration;
        defaults **1800** s = **30 minutes** each); opaque refresh token Redis **`EX`** matches guest refresh TTL.
      tags:
        - Auth
      parameters:
        - name: X-Client-Fingerprint
          in: header
          required: false
          description: >-
            Optional stable client id (e.g. device/install). When present, **`POST /auth/guest`** is also rate-limited per hashed
            fingerprint (**`GUEST_AUTH_RATE_LIMIT_MAX_PER_FINGERPRINT`**) in addition to per-IP.
          schema:
            type: string
            maxLength: 512
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestRequest'
      responses:
        '200':
          description: >-
            Guest session created (GuestAuthResponse). user.guest is true; access JWT includes a guest claim.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestAuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Guest sessions disabled by runtime configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already taken (**`USERNAME_TAKEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many guest session attempts (**`RATE_LIMIT_EXCEEDED`**) — per IP and/or per **`X-Client-Fingerprint`**
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: login
      summary: Email/password login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh tokens issued (**only** when **`emailVerified`** is true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Email not verified — complete **`POST /auth/verify-email`** first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      operationId: refreshTokens
      summary: Rotate refresh token and issue new access token
      description: |
        For **registered** users, access and refresh TTLs follow **`ACCESS_TOKEN_TTL_SECONDS`** and **`REFRESH_TOKEN_TTL_SECONDS`**.
        For **guest** users (`User.isGuest`), the server uses **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** and **`GUEST_REFRESH_TOKEN_TTL_SECONDS`**
        (defaults **30 minutes** each; see **`README.md`**).
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access and refresh tokens (previous refresh token invalidated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Email not verified — cannot refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke refresh token (logout)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Refresh token revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request password reset email (same response whether or not email exists)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Too many requests from this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Set new password using JWT from forgot-password email
      description: |
        If the reset token targets a **guest** account, returns **403** **`GUEST_ACTION_FORBIDDEN`** (guests cannot set a password).
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated; all refresh tokens invalidated server-side
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Guest account — password reset not applicable (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      operationId: getCurrentUser
      summary: Current authenticated user
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      operationId: updateCurrentUserProfile
      summary: Update current user profile
      description: |
        **Multipart** profile update: optional **profile image** (`file` part), optional **status**
        text, optional **displayName**. At least one part should be supplied; omitted fields are left
        unchanged. Server stores the image via the same pipeline as **`POST /media/upload`** (S3 key
        on user document + public URL in **`profilePicture`**).

        **Not available for guest sessions** — use **`POST /auth/register`** for a full account. Guests receive **403** **`GUEST_ACTION_FORBIDDEN`**.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Guest session — profile update not allowed (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/devices:
    get:
      operationId: listMyDevices
      summary: List registered devices for the current user
      description: |
        Returns **`deviceId`**, **`deviceLabel`**, **`createdAt`**, and **`lastSeenAt`** for each device row owned by the caller.
        Omits **`publicKey`** (use **`GET /users/{userId}/devices/public-keys`** when key material is required). Intended for
        trusted-device UX (e.g. confirming a new device is registered pending sync). No query parameters; unknown keys yield **400**.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Device metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: registerMyDevice
      summary: Register or update a device E2EE public key
      description: |
        Inserts or updates a **`(userId, deviceId)`** row. Send **`publicKey`** or **`pubKey`** (P-256 SPKI Base64).
        Optional **`deviceLabel`** is stored for UX (e.g. "Chrome on MacBook"). When **`deviceId`** is omitted, the server
        assigns a new id (UUID). When **`deviceId`** is sent, the same device can re-register an updated key idempotently.
        With **`bootstrap: true`**, the response is **201** and **`RegisterDeviceBootstrapResponse`** (`deviceId` only).
        On **first insert** of a new row (not idempotent update), the server emits Socket.IO **`device:sync_requested`**
        to room **`user:<userId>`** with **`{ newDeviceId, newDevicePublicKey }`** so other connected clients can react
        (same-process delivery; not brokered).
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered (full payload; default when **`bootstrap`** is omitted or false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponse'
        '201':
          description: Bootstrap registration — request body included bootstrap true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceBootstrapResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: JSON body exceeds the smaller limit used for **`POST /users/me/devices`**
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Per-user rate limit on device registration / deletion exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/devices/{deviceId}:
    delete:
      operationId: deleteMyDevice
      summary: Revoke a device public key for the current user
      description: |
        **Authorization:** only the **authenticated account** may remove **its own** device rows. The path is always
        **`/users/me/...`** — there is no API to delete another user’s devices.

        Deletes the **`user_device_public_keys`** document for **`(authenticatedUserId, deviceId)`**. **204** if a row was
        removed; **404** if no matching row exists.

        **Historical messages are not updated:** existing **`Message`** documents may still contain
        **`encryptedMessageKeys[deviceId]`** for this device. Stripping those entries would require scanning and patching
        many message documents (write amplification, races with concurrent sends). The chosen tradeoff is **registry-only
        revocation**: the device no longer appears in **`GET …/devices/public-keys`**, so senders must not wrap new keys
        for it; old wrapped-key blobs remain as opaque metadata until optional future compaction. Clients must tolerate
        orphaned map entries for revoked devices when reading history.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '204':
          description: Device removed from registry
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Per-user rate limit on device register/delete exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/sync/message-keys:
    get:
      operationId: listMySyncMessageKeys
      summary: List wrapped message keys for a registered device (multi-device sync)
      description: |
        Returns **`messageId`** and this device’s **`encryptedMessageKeys[deviceId]`** for hybrid-E2EE messages in every
        conversation the user participates in. Does **not** return **`body`**, **`iv`**, or other devices’ wrapped keys.
        **`deviceId`** must match an active device row for the caller (see **`GET /users/me/devices`**).
        Pagination uses keyset order **`(createdAt ascending, id ascending)`**. Omit **`afterMessageId`** for the first page;
        when **`hasMore`** is true, pass **`nextAfterMessageId`** as **`afterMessageId`** on the next request.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
            pattern: '^[A-Za-z0-9_-]+$'
          description: Registered device id — selects **`encryptedMessageKeys[deviceId]`** on each message
        - name: afterMessageId
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: >-
            Exclusive cursor. Next page returns messages strictly after this **`Message`** **`id`** in sort order.
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Page of wrapped keys for the requested device (each row is **`SyncMessageKeyEntry`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncMessageKeysListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: batchUploadMySyncMessageKeys
      summary: Batch-upload wrapped message keys for another registered device
      description: |
        Requires a **device-bound** access JWT (**`sourceDeviceId`** claim). Obtain it by **`POST /auth/login`** or **`POST /auth/refresh`**
        with optional **`sourceDeviceId`** in the JSON body (must match an active row from **`GET /users/me/devices`**).
        For each **`keys`** item, the server **`$set`s** **`encryptedMessageKeys[targetDeviceId]`** when the caller’s **`sourceDeviceId`**
        already has a non-empty wrapped key on that message and the user participates in the thread. Re-sending the same pair is safe (**idempotent**).
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchKeyUploadRequest'
      responses:
        '200':
          description: Counts of applied vs skipped updates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchKeyUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: JSON body exceeds the device-sync batch size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: >-
            Per-user Redis fixed-window cap on batch sync uploads exceeded (**`DEVICE_SYNC_RATE_LIMIT_*`** in **`README.md`**
            Configuration; stacks with **`GLOBAL_RATE_LIMIT_*`**).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/devices/public-keys:
    get:
      operationId: listUserDevicePublicKeys
      summary: List active device public keys for a user
      description: |
        Returns all registered devices for **`userId`**. **Authorization:** self, loose peer fetch, or direct-thread-only when
        **`PUBLIC_KEY_FETCH_REQUIRE_DIRECT_THREAD`** is set (**`README.md`**).
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Device public keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePublicKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}:
    get:
      operationId: getUserById
      summary: Public profile by id (planned; authz per policy)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/search:
    get:
      operationId: searchUsers
      summary: Search users by email and/or username (substring match; not by opaque user id)
      description: |
        **Matching:** **case-insensitive substring** on the **normalized** (trim + lowercase)
        stored **`email`** and **`username`**. Results are ordered by **relevance** (best match on either field):
        **exact** match first, then **prefix**, then other substring matches; ties break by **`email`**
        ascending.

        **Query:** send **`q`** (preferred) or legacy **`email`** — same matching rules; exactly one is required.

        **Abuse controls:** query length **3–254** by default (**`USER_SEARCH_MIN_QUERY_LENGTH`** may be
        lowered to **2** only when operators accept weaker bounds); allowed charset
        **`[a-z0-9@._+_-]`** (includes **`_`** for username fragments); regex metacharacters are **escaped** server-side; response size is capped
        by **`limit`** (default **20**, max **100**); MongoDB candidate scan per request is bounded
        (**`USER_SEARCH_MAX_CANDIDATE_SCAN`**).

        **Guest directory (Feature 2a):** when the bearer identifies a **guest** (`User.guest` / JWT `guest` claim),
        the server applies **`isGuest: true`** in the user query — **registered users never appear** in results.
        **`q`** / **`email`** / **`limit`** behave the same; only the result set is restricted. **Rate limiting:** guest
        callers use **`GUEST_USER_SEARCH_RATE_LIMIT_*`** (separate Redis key **`ratelimit:users-search:guest-ip:*`**,
        typically stricter **`MAX`** than registered **`USER_SEARCH_RATE_LIMIT_*`**). Registered callers use
        **`USER_SEARCH_RATE_LIMIT_*`**. **429** **`RATE_LIMIT_EXCEEDED`** when either cap is exceeded.

        Returns username, display name, profile picture, **`guest`** flag, and the **direct conversation id** with the
        current user when a conversation already exists (null when none). The caller never
        receives their own row.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 254
          description: >
            Preferred search string (**trimmed**, lowercased). **Substring** match on stored **email** and **username**.
            Use this or **`email`** (legacy alias). Allowed characters: letters, digits, **`@._+-_`**.
        - name: email
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 254
          description: >
            Legacy alias for **`q`** — same behaviour. Provide **`q`** or **`email`** (not both required in OpenAPI;
            server requires at least one).
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many search requests from this client IP (Redis per-IP limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /conversations:
    get:
      operationId: listConversations
      summary: List direct conversations for the current user (cursor pagination; newest activity first)
      description: |
        Returns **direct 1:1** threads where the caller is a **participant**, **newest `updatedAt` first**.
        **`cursor`** is opaque (from **`nextCursor`**); malformed cursors return **400**.
      tags:
        - Conversations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{conversationId}/messages:
    get:
      operationId: listMessages
      summary: List messages in a direct 1:1 conversation (cursor pagination; participants only)
      description: |
        **Direct 1:1** threads only — **group** conversations return **403** until group messaging is implemented.
        The caller must be a **participant**; otherwise **403**. Messages are returned **newest first**.
        **`cursor`** is opaque (from **`nextCursor`**); malformed cursors return **400**.
        **Rate limiting:** the **global** REST per-IP limit (`GLOBAL_RATE_LIMIT_*` in **`README.md`** (Configuration section)) applies to this route; exceeding it returns **429** with **`ErrorResponse`** (**`code`** typically **`RATE_LIMIT_EXCEEDED`**).
      tags:
        - Messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Global REST per-IP rate limit exceeded (`GLOBAL_RATE_LIMIT_*`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /conversations/{conversationId}/message-receipts:
    get:
      operationId: listMessageReceipts
      summary: List message receipt summaries for a direct 1:1 conversation (cursor pagination; participants only)
      description: |
        **Narrow receipt sync:** returns **`messageId`**, **`createdAt`**, and optional **`receiptsByUserId`** per row —
        **no** message body, **`mediaKey`**, or **`senderId`**. Use this to refresh delivery/read state without
        re-downloading full **`Message`** bodies from **`GET /conversations/{id}/messages`**.

        **`Message`** objects from **`GET /messages`** and Socket.IO **`message:new`** **do not** include receipt fields;
        combine this route with real-time **`message:delivered`** / **`message:read`** / **`conversation:read`** events.

        **Direct 1:1** only — **group** returns **403**. Same opaque **`cursor`** / **`nextCursor`** as the message list
        (**newest first**). **`readCursor`** is the authenticated user’s durable read cursor (**`conversation_reads`**),
        or **`null`** if none.
      tags:
        - Messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated receipt summaries and optional read cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageReceiptPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Global REST per-IP rate limit exceeded (`GLOBAL_RATE_LIMIT_*`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /messages:
    post:
      operationId: sendMessage
      deprecated: true
      summary: Send a message (direct 1:1; group not supported yet) — deprecated
      description: |
        **Deprecated.** Prefer the Socket.IO event **`message:send`** (same **`SendMessageRequest`**
        payload; ack returns **`Message`** or `{ code, message }`). This REST route remains supported
        for **integration tests**, **automation**, and **debugging**; production interactive clients
        should not rely on it long term.

        **`conversationId` is optional.** If omitted for a **new direct 1:1** thread, the server
        creates the conversation, then persists the message — provide **`recipientUserId`** (the
        other participant). For an existing thread, send **`conversationId`** and omit
        **`recipientUserId`**. **Group** threads return **403** until group messaging is implemented.
        Request body must include **`body`** text and/or **`mediaKey`** (validated by Zod).

        **Guest sandbox:** direct sends require **both** participants to be **guests** or **both** to be **registered** —
        guest ↔ registered pairs return **403** with **`code`** **`GUEST_MESSAGING_FORBIDDEN`** (same rule on Socket.IO **`message:send`**).

        **Rate limiting:** this route uses the **message-send** limits (**`MESSAGE_SEND_RATE_LIMIT_*`**, per user + IP)
        in addition to the **global** REST per-IP limit — see **`README.md`** (Configuration section) (*Global vs per-route*). Either
        can return **429** with **`ErrorResponse`** (**`code`** **`RATE_LIMIT_EXCEEDED`**).
      tags:
        - Messages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message created (includes `conversationId`; may be newly created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: >-
            Group thread not supported, or **guest ↔ registered** messaging blocked (**`GUEST_MESSAGING_FORBIDDEN`** —
            only guest↔guest or registered↔registered direct threads).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Message-send and/or global REST rate limit exceeded (`MESSAGE_SEND_RATE_LIMIT_*`, `GLOBAL_RATE_LIMIT_*`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /groups:
    post:
      operationId: createGroup
      summary: Create a group (planned)
      tags:
        - Groups
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/upload:
    post:
      operationId: uploadMedia
      summary: Upload a file; messaging-service stores in S3 via AWS SDK (`@aws-sdk/lib-storage` Upload)
      description: |
        Multipart field **`file`**. Max size is enforced by **`MEDIA_MAX_BYTES`** on the server
        (default **30 MiB** per file for image/video; override via environment). Allowed MIME types
        are server-defined (see messaging-service implementation).
      tags:
        - Media
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Object stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Short-lived access token (see Auth responses for refresh flow). May include optional custom claim **`sourceDeviceId`**
        (string) when issued from **`POST /auth/login`**, **`POST /auth/refresh`**, **`POST /auth/register`**, or **`POST /auth/guest`**
        with a validated **`sourceDeviceId`** body field — required for **`POST /users/me/sync/message-keys`**.

  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: User identifier

    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_-]+$'
      description: >-
        Device identifier (e.g. UUID from **`POST /users/me/devices`**, or **`default`** for migrated single-key rows).
        Letters, digits, underscore, hyphen only.

    ConversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
      description: Conversation identifier

    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor from a previous list response

    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: |
        Optional page size; **default `20`** when omitted on all paginated list endpoints that
        support this parameter. Server may enforce a lower cap.

  responses:
    BadRequest:
      description: Validation or malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Authenticated but not allowed for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ReadyResponse:
      type: object
      required:
        - ready
      properties:
        ready:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code
        message:
          type: string
          description: Safe client-facing message

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
        - displayName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9_]+$'
          description: >-
            Unique handle, stored lowercase; letters, digits, and underscores only (server normalizes case).
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name shown in the app (trimmed on the server).
        profilePicture:
          type: string
          format: uri
          nullable: true
          description: Optional avatar URL at signup (e.g. from `POST /media/upload` before register)
        status:
          type: string
          nullable: true
          maxLength: 280
          description: Optional short status line at signup
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this user, the access JWT includes **`sourceDeviceId`**.

    GuestRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9_]+$'
          description: >-
            Unique handle for the guest session; stored lowercase (same rules as register **`username`**).
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Optional; may match or differ from **`username`** (trimmed on the server).
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this guest user, the access JWT includes **`sourceDeviceId`**.

    GuestAuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - user
        - tokenType
        - expiresIn
        - expiresAt
      properties:
        accessToken:
          type: string
          description: >-
            HS256 access JWT; includes a boolean **`guest`** custom claim (true for guest sessions)
        refreshToken:
          type: string
          description: Opaque refresh token (Redis); TTL matches **`GUEST_REFRESH_TOKEN_TTL_SECONDS`** for guests
        user:
          $ref: '#/components/schemas/User'
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Access token lifetime in seconds (same window as **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** for guests)
        expiresAt:
          type: string
          format: date-time
          description: Absolute UTC expiry of the access token (for UI countdown)

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Signed JWT from registration or resend

    VerifyEmailResponse:
      type: object
      required:
        - user
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
          description: Access JWT for the verified session
        refreshToken:
          type: string
          description: Opaque refresh token (stored in Redis)
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Access token lifetime in seconds

    ResendVerificationRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResendVerificationResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    UpdateProfileRequest:
      type: object
      description: Multipart parts — all optional; include at least one field to change
      properties:
        file:
          type: string
          format: binary
          description: New profile image (image/*); stored server-side; `profilePicture` URL returned on `User`
        status:
          type: string
          maxLength: 280
          description: New status text (omit to leave unchanged)
        displayName:
          type: string
          description: New display name (omit to leave unchanged)

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this user, the access JWT includes **`sourceDeviceId`** for device-bound APIs.

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this user, the new access JWT includes **`sourceDeviceId`**.

    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
          description: Signed JWT from forgot-password email
        password:
          type: string
          format: password
          minLength: 8

    OkResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    AuthResponse:
      type: object
      required:
        - tokenType
      properties:
        accessToken:
          type: string
          nullable: true
          description: null after register when email verification is pending; otherwise HS256 JWT
        refreshToken:
          type: string
          nullable: true
          description: Opaque refresh token (Redis); null when access token is not issued
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          nullable: true
          description: >-
            null when accessToken is null; otherwise access token lifetime in seconds. Guest sessions use
            **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** (default **1800**); registered users use **`ACCESS_TOKEN_TTL_SECONDS`**.
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            null when accessToken is null. When present (e.g. guest **`POST /auth/refresh`**), absolute UTC expiry of the
            access token — same semantics as **`GuestAuthResponse.expiresAt`**.

    User:
      type: object
      required:
        - id
        - guest
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          nullable: true
          description: Null for guest accounts (no email stored)
        username:
          type: string
          nullable: true
          minLength: 3
          maxLength: 30
          description: Unique handle (null for legacy accounts predating usernames)
        displayName:
          type: string
          nullable: true
        emailVerified:
          type: boolean
          description: >-
            Present on every **`User`**. Meaning depends on deployment: when **`EMAIL_VERIFICATION_REQUIRED`** is **`true`**
            (messaging-service env), new users may be **`false`** until **`POST /auth/verify-email`** succeeds; when **`false`**,
            registration typically sets this to **`true`** immediately. See **`README.md`** (Configuration section) — email verification.
        profilePicture:
          type: string
          format: uri
          nullable: true
          description: HTTPS URL or CDN URL for avatar (or null if unset)
        status:
          type: string
          nullable: true
          maxLength: 280
          description: Short user-defined status line
        guest:
          type: boolean
          description: >-
            True for temporary guest sandbox accounts (POST /auth/guest); false for full registrations.

    UserPublic:
      type: object
      required:
        - id
        - guest
      properties:
        id:
          type: string
        displayName:
          type: string
          nullable: true
        profilePicture:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          nullable: true
          maxLength: 280

    RegisterDeviceRequest:
      type: object
      additionalProperties: false
      description: |
        Register or update one device — **never** include a private key. Supply **`publicKey`** *or* **`pubKey`**
        (same P-256 SPKI Base64 rules); if both are sent they must be identical.
      properties:
        publicKey:
          type: string
          maxLength: 2048
          description: P-256 SPKI Base64 (**`docs/PROJECT_PLAN.md` §14**)
        pubKey:
          type: string
          maxLength: 2048
          description: Alias for **`publicKey`** (bootstrap / mobile naming)
        deviceLabel:
          type: string
          maxLength: 200
          nullable: true
          description: Optional human-readable label (e.g. "Chrome on MacBook")
        deviceId:
          type: string
          maxLength: 128
          description: >-
            Optional client-chosen id so the same physical device can re-register; when omitted the server assigns a new id
        bootstrap:
          type: boolean
          description: >-
            When true, HTTP **201** with **`RegisterDeviceBootstrapResponse`** (only **`deviceId`** in the JSON body).

    RegisterDeviceBootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - deviceId
      description: >-
        Returned for **`POST /users/me/devices`** when the request sets **`bootstrap`** to true.
      properties:
        deviceId:
          type: string
          description: Server-assigned or client-supplied device id for this row

    RegisterDeviceResponse:
      type: object
      required:
        - deviceId
        - publicKey
        - keyVersion
        - createdAt
        - updatedAt
      properties:
        deviceId:
          type: string
        publicKey:
          type: string
        keyVersion:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DevicePublicKeyEntry:
      type: object
      required:
        - deviceId
        - publicKey
        - keyVersion
        - createdAt
        - updatedAt
      properties:
        deviceId:
          type: string
        publicKey:
          type: string
        keyVersion:
          type: integer
          minimum: 1
          description: Monotonic per **`(userId, deviceId)`** row; increments when the device re-registers a new SPKI
        deviceLabel:
          type: string
          maxLength: 200
          nullable: true
          description: Present when the device was registered with a label
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DevicePublicKeyListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DevicePublicKeyEntry'

    DeviceListItem:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - deviceLabel
        - createdAt
        - lastSeenAt
        - publicKey
      properties:
        deviceId:
          type: string
          description: Server-assigned or client-supplied device id for this row
        deviceLabel:
          type: string
          nullable: true
          maxLength: 200
          description: Human-readable label when set; otherwise null
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
          description: >-
            Last activity recorded for this row (e.g. device re-registration). Legacy rows without a stored value use **`updatedAt`**.
        publicKey:
          type: string
          maxLength: 2048
          description: P-256 ECDH public key (**SPKI** DER, standard Base64) for this device row — same material as **`POST /users/me/devices`**.

    DeviceListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      description: Response body for **`GET /users/me/devices`** — caller-owned device rows including **`publicKey`** for hybrid E2EE and sync verification
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeviceListItem'

    SyncMessageKeyEntry:
      type: object
      additionalProperties: false
      required:
        - messageId
        - encryptedMessageKey
      description: One wrapped symmetric key for a single message and device (GET sync list or **`BatchKeyUploadRequest.keys`** item)
      properties:
        messageId:
          type: string
          maxLength: 200
          description: >-
            Stable **`Message`** primary key (**`id`** field) for the row that contains this wrapped key.
        encryptedMessageKey:
          type: string
          maxLength: 131072
          description: >-
            Opaque wrapped symmetric key for the requested device (same storage semantics as **`Message.encryptedMessageKeys`** values).

    SyncMessageKeysListResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - hasMore
        - nextAfterMessageId
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SyncMessageKeyEntry'
        hasMore:
          type: boolean
        nextAfterMessageId:
          type: string
          nullable: true
          description: >-
            When **`hasMore`** is true, set **`afterMessageId`** on the next request to this value. Otherwise null.

    RegisteredDeviceIdWire:
      type: string
      maxLength: 128
      pattern: '^[A-Za-z0-9_-]+$'
      description: Device id as stored in **`user_device_public_keys`** (e.g. UUID or **`default`**)

    BatchKeyUploadRequest:
      type: object
      additionalProperties: false
      required:
        - targetDeviceId
        - keys
      description: Body for **`POST /users/me/sync/message-keys`** — each **`keys`** element matches **`SyncMessageKeyEntry`**
      properties:
        targetDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
        keys:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/SyncMessageKeyEntry'

    BatchKeyUploadResponse:
      type: object
      additionalProperties: false
      required:
        - applied
        - skipped
      description: Result counts for **`POST /users/me/sync/message-keys`**
      properties:
        applied:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0

    UserSearchResult:
      type: object
      required:
        - userId
        - guest
      description: One row from user search — includes existing direct conversation when present
      properties:
        userId:
          type: string
          description: Internal user id for messaging / `recipientUserId`
        username:
          type: string
          nullable: true
          description: Unique handle when set; null for legacy users
        displayName:
          type: string
          nullable: true
        profilePicture:
          type: string
          format: uri
          nullable: true
        conversationId:
          type: string
          nullable: true
          description: Direct conversation id between searcher and this user if it exists; null if first contact
        guest:
          type: boolean
          description: Whether this row is a guest sandbox user (directory filtering for guest callers)

    Conversation:
      type: object
      required:
        - id
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        isGroup:
          type: boolean
        peerUserId:
          type: string
          nullable: true
          description: |
            **Direct 1:1** — the other participant's user id (not the authenticated user). **Null** for group
            threads when group messaging exists; list responses currently return **direct** rows only.
        memberIds:
          type: array
          items:
            type: string
          description: |
            **Group** threads — **participant user ids** (including the caller) when the group is materialized;
            omit for **direct** 1:1. Clients use this for **aggregate receipt** UI (all delivered / all seen).
        updatedAt:
          type: string
          format: date-time

    ConversationPage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    MessageReceiptEntry:
      type: object
      description: |
        Per-recipient **delivered** / **seen** timestamps (**Feature 12**). Map keys are **`userId`** strings.
        Exposed on **`MessageReceiptSummary.receiptsByUserId`** and via Socket.IO receipt events — **not** on **`Message`**.
        Group **read-up-to** may also use **`conversation_reads`** — see **`docs/PROJECT_PLAN.md` §14**.
      properties:
        deliveredAt:
          type: string
          format: date-time
          description: When the recipient client positively acknowledged delivery (in-app).
        seenAt:
          type: string
          format: date-time
          description: When the recipient read the message (per-message materialization).

    Message:
      type: object
      required:
        - id
        - conversationId
        - senderId
        - createdAt
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        body:
          type: string
          nullable: true
          description: |
            **Text or opaque E2EE payload.** Plain UTF-8 text, or **AES-256-GCM** ciphertext of the message plaintext
            when hybrid E2EE is enabled (see **`docs/PROJECT_PLAN.md` §7.1**). The server **stores and routes**
            this value **without** decrypting. Use **`encryptedMessageKeys`** + **`iv`** with device-key APIs
            (`POST /users/me/devices`, `GET /users/{userId}/devices/public-keys`) per **Prerequisite — User keypair**
            in **`docs/TASK_CHECKLIST.md`**.
        mediaKey:
          type: string
          nullable: true
          description: S3 object key when message has an attachment
        encryptedMessageKeys:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: >-
            Per-device wrapped symmetric keys (**deviceId** → opaque base64). Omitted for plaintext messages.
            See **`docs/PROJECT_PLAN.md` §7.1**.
        iv:
          type: string
          nullable: true
          description: AES-GCM IV/nonce for **`body`** when E2EE — opaque to the server
        algorithm:
          type: string
          nullable: true
          maxLength: 256
          description: |
            Client-only tag naming the E2EE scheme (e.g. **`aes-256-gcm+p256-hybrid-v1`** for hybrid
            **`body`** + **`encryptedMessageKeys`**). The server stores this **without** interpreting or validating it.
        createdAt:
          type: string
          format: date-time
      description: |
        Chat row without receipt fields. **Delivery/read state** — **`GET /conversations/{conversationId}/message-receipts`**
        and Socket.IO **`message:delivered`** / **`message:read`** / **`conversation:read`**.

    MessageReceiptSummary:
      type: object
      required:
        - messageId
        - conversationId
        - createdAt
      description: |
        Receipt-related fields for one message — **no** **`body`**, **`mediaKey`**, or **`senderId`**.
      properties:
        messageId:
          type: string
        conversationId:
          type: string
        createdAt:
          type: string
          format: date-time
        receiptsByUserId:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MessageReceiptEntry'
          description: Omitted when no receipt data is stored for this message.

    ConversationReadCursor:
      type: object
      required:
        - lastReadMessageId
        - lastReadAt
      description: |
        Authenticated user’s **read-up-to** cursor for this conversation (**`conversation_reads`**).
      properties:
        lastReadMessageId:
          type: string
        lastReadAt:
          type: string
          format: date-time

    MessageReceiptPage:
      type: object
      required:
        - items
        - hasMore
        - readCursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MessageReceiptSummary'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
        readCursor:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ConversationReadCursor'
          description: >
            JSON null when the user has no stored read cursor for this thread.

    MessagePage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    SendMessageRequest:
      type: object
      description: |
        **Direct 1:1 — new thread:** omit `conversationId`, set `recipientUserId`. **Direct 1:1 —
        existing thread:** set `conversationId`, omit `recipientUserId`. **Group:** set
        `conversationId` for the group.
      properties:
        conversationId:
          type: string
          nullable: true
          description: Existing conversation; omit to create a new direct conversation (see `recipientUserId`)
        recipientUserId:
          type: string
          nullable: true
          description: Other user when starting a new direct thread; omit when `conversationId` is set
        body:
          type: string
          description: |
            **Message body text or opaque E2EE ciphertext** — same semantics as **`Message.body`** (server does not decrypt).
            When sending E2EE payloads, clients **depend on** user public-key directory APIs and the **Prerequisite — User keypair**
            implementation (`docs/TASK_CHECKLIST.md`, `docs/PROJECT_PLAN.md` §14).
        mediaKey:
          type: string
          nullable: true
          description: From prior upload response
        encryptedMessageKeys:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Hybrid E2EE — per-device wrapped message keys; server stores opaquely
        iv:
          type: string
          nullable: true
          description: AES-GCM IV for **`body`** when using **`encryptedMessageKeys`**
        algorithm:
          type: string
          nullable: true
          maxLength: 256
          description: |
            Same semantics as **`Message.algorithm`** — required when **`encryptedMessageKeys`** is non-empty.

    Group:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        createdBy:
          type: string

    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        memberIds:
          type: array
          items:
            type: string

    MediaUploadResponse:
      type: object
      required:
        - key
        - bucket
      properties:
        key:
          type: string
        bucket:
          type: string
        url:
          type: string
          format: uri
          nullable: true
          description: Optional HTTPS URL for display if bucket policy allows
