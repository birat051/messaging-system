openapi: 3.0.3
info:
  title: Ekko API
  version: 0.1.48
  description: |
    **Ekko** is a **developer-first**, **end-to-end secure** messaging platform: private keys stay on devices, the server
    stores ciphertext and routes traffic, and the stack is built to be **self-hosted** and **API-driven**.

    This file is the authoritative **OpenAPI 3** contract for **messaging-service** REST resources under **`/v1`** (see **servers**).
    Real-time chat, receipts, in-tab notifications, **WebRTC** signaling, and multi-device key sync notifications use **Socket.IO**
    on the same HTTP origin—those flows are **not** expressed as REST operations here. Prefer the **`message:send`** socket
    event for sending; **`POST /messages`** is **deprecated** (tests and automation only).

    After editing this spec, regenerate client types: **`npm run generate:api`** in **`apps/web-client`**.
    Broader architecture, cryptographic envelope specifics, and operator runbooks are maintained outside this contract.

servers:
  - url: /v1
    description: API version 1 (relative to messaging-service origin)

tags:
  - name: System
    description: Liveness and readiness
  - name: Auth
    description: Registration, login, tokens
  - name: Users
    description: Profiles, search, public keys
  - name: Conversations
    description: Direct and group threads
  - name: Messages
    description: Send and list messages
  - name: Groups
    description: Group lifecycle and membership
  - name: Contacts
    description: Contact lists and requests
  - name: Media
    description: Multipart uploads and S3-compatible pre-signed PUT URLs.
  - name: 'Device sync (Feature 13)'
    description: Per-device public keys and multi-device encrypted key sync (**`/users/me/devices`**, **`/sync/message-keys`**).

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness — process is up (no dependency checks)
      tags:
        - System
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      operationId: getReady
      summary: Readiness — dependencies satisfied for serving traffic
      tags:
        - System
      responses:
        '200':
          description: Ready to accept traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready (dependencies unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user (Argon2 password hash; optional profilePicture and status)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: >-
            Created. **`accessToken`** is **`null`** when **`emailVerified`** is false (email verification required);
            use **`POST /auth/verify-email`** then **`accessToken`** is returned there, or sign in with **`POST /auth/login`** after verification.
            When verification is not required, an access token is returned immediately.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: >-
            Conflict — email already registered (**`EMAIL_ALREADY_REGISTERED`**) or username taken (**`USERNAME_TAKEN`**).
            Check **`code`** in **`ErrorResponse`**.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many registration attempts from this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured (e.g. missing JWT_SECRET)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify email using signed JWT from registration or resend (throttled per IP)
      description: |
        When **`EMAIL_VERIFICATION_REQUIRED`** is **`false`** on the server, returns **400** with **`ErrorResponse`**
        **`code`** **`EMAIL_VERIFICATION_DISABLED`** — the verification flow is not used (messaging-service **`EMAIL_VERIFICATION_REQUIRED`** controls this).
        If the token resolves to a **guest** account, returns **403** **`GUEST_ACTION_FORBIDDEN`**.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified (or already verified) — includes **`accessToken`** for the verified session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Guest account — email verification not applicable (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many verification attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/resend-verification:
    post:
      operationId: resendVerificationEmail
      summary: Resend verification flow (throttled per email; constant response to avoid enumeration)
      description: |
        When **`EMAIL_VERIFICATION_REQUIRED`** is **`false`**, returns **400** with **`code`** **`EMAIL_VERIFICATION_DISABLED`**.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '200':
          description: >-
            Request accepted (always ok true in body whether or not an unverified user existed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendVerificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Too many resend requests for this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/guest:
    post:
      operationId: createGuestSession
      summary: Create a guest session (planned — not yet implemented when enabled)
      description: |
        **On/off** is controlled by **`guestSessionsEnabled`** in MongoDB **`system_config`** (singleton), merged with env
        **`GUEST_SESSIONS_ENABLED`** via effective runtime config (merged **env** + MongoDB **`system_config`**). When disabled,
        returns **403** with **`code`** **`GUEST_SESSIONS_DISABLED`** before body validation. When enabled, creates a guest **`User`** row (no email; optional MongoDB TTL via **`guestDataExpiresAt`** when **`guestDataTtlEnabled`** is true in **`system_config`** / env).

        **Rate limits (Redis):** per client IP (**`GUEST_AUTH_RATE_LIMIT_*`**); when **`X-Client-Fingerprint`** is sent, an additional
        per-fingerprint bucket applies so one IP cannot rotate unlimited guest identities and one fingerprint cannot bypass IP caps alone.

        Success body is **`GuestAuthResponse`**: tokens, **`user`** with **`guest: true`**, **`expiresIn`** (seconds),
        and **`expiresAt`** (ISO 8601 absolute access expiry). Access JWT payload includes **`guest: true`**. Guest sessions use
        **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** and **`GUEST_REFRESH_TOKEN_TTL_SECONDS`** (messaging-service **env**, defaults **1800** s = **30 minutes** each); opaque refresh token Redis **`EX`** matches guest refresh TTL.
      tags:
        - Auth
      parameters:
        - name: X-Client-Fingerprint
          in: header
          required: false
          description: >-
            Optional stable client id (e.g. device/install). When present, **`POST /auth/guest`** is also rate-limited per hashed
            fingerprint (**`GUEST_AUTH_RATE_LIMIT_MAX_PER_FINGERPRINT`**) in addition to per-IP.
          schema:
            type: string
            maxLength: 512
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestRequest'
      responses:
        '200':
          description: >-
            Guest session created (GuestAuthResponse). user.guest is true; access JWT includes a guest claim.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestAuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Guest sessions disabled by runtime configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already taken (**`USERNAME_TAKEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many guest session attempts (**`RATE_LIMIT_EXCEEDED`**) — per IP and/or per **`X-Client-Fingerprint`**
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: login
      summary: Email/password login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh tokens issued (**only** when **`emailVerified`** is true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Email not verified — complete **`POST /auth/verify-email`** first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      operationId: refreshTokens
      summary: Rotate refresh token and issue new access token
      description: |
        For **registered** users, access and refresh TTLs follow **`ACCESS_TOKEN_TTL_SECONDS`** and **`REFRESH_TOKEN_TTL_SECONDS`**.
        For **guest** users (`User.isGuest`), the server uses **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** and **`GUEST_REFRESH_TOKEN_TTL_SECONDS`**
        (defaults **30 minutes** each; **`GUEST_*_TTL`** messaging-service env).
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access and refresh tokens (previous refresh token invalidated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Email not verified — cannot refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke refresh token (logout)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Refresh token revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request password reset email (same response whether or not email exists)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Too many requests from this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Set new password using JWT from forgot-password email
      description: |
        If the reset token targets a **guest** account, returns **403** **`GUEST_ACTION_FORBIDDEN`** (guests cannot set a password).
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated; all refresh tokens invalidated server-side
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Guest account — password reset not applicable (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth signing not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      operationId: getCurrentUser
      summary: Current authenticated user
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      operationId: updateCurrentUserProfile
      summary: Update current user profile
      description: |
        **Multipart** — optional **profile image** (`file` part), optional **status**, optional **displayName**.
        At least one part should be supplied; omitted fields are unchanged. The server may upload **`file`**
        with the same object-key layout as **`POST /media/upload`** and persists a public URL (or key) in **`profilePicture`**.

        **JSON** — optional **`profilePicture`** (HTTPS URL or **`null`** to clear), optional **`profilePictureMediaKey`**
        (S3 object key returned from **`POST /users/me/avatar/presign`** after the client **`PUT`** completes — must
        belong to **`users/{callerId}/…`**), optional **`displayName`**, optional **`status`**. Send at least one field;
        do not send both **`profilePicture`** and **`profilePictureMediaKey`**.

        **Not available for guest sessions** — use **`POST /auth/register`** for a full account. Guests receive **403** **`GUEST_ACTION_FORBIDDEN`**.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileJsonRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Guest session — profile update not allowed (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Multipart **`file`** upload when S3 is not configured (**`MEDIA_NOT_CONFIGURED`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/avatar/presign:
    post:
      operationId: postMyAvatarPresign
      summary: Pre-signed PUT URL for profile avatar upload
      description: |
        Returns a short-lived **pre-signed `PUT` URL** for an object key under **`users/{userId}/…`** (same layout as
        **`POST /media/presign`**). **`contentType`** must be an **image/** MIME from **`AvatarPresignContentType`**;
        **`contentLength`** must match the **`PUT`** body. After upload, call **`PATCH /users/me`** with
        **`application/json`** and **`profilePictureMediaKey`** set to the returned **`key`** (or set **`profilePicture`**
        to the final public HTTPS URL if you host it elsewhere).

        **Not available for guest sessions** (**403** **`GUEST_ACTION_FORBIDDEN`**). Requires S3 (**503** **`MEDIA_NOT_CONFIGURED`** when omitted).
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarPresignRequest'
      responses:
        '200':
          description: Pre-signed upload target (same shape as **`MediaPresignResponse`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaPresignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Guest session — not allowed (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: S3 not configured (**`MEDIA_NOT_CONFIGURED`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/devices:
    get:
      operationId: listMyDevices
      summary: List registered devices for the current user
      description: |
        Returns **`deviceId`**, **`deviceLabel`**, **`createdAt`**, and **`lastSeenAt`** for each device row owned by the caller.
        Omits **`publicKey`** (use **`GET /users/{userId}/devices/public-keys`** when key material is required). Intended for
        trusted-device UX (e.g. confirming a new device is registered pending sync). No query parameters; unknown keys yield **400**.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Device metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: registerMyDevice
      summary: Register or update a device E2EE public key
      description: |
        Inserts or updates a **`(userId, deviceId)`** row. Send **`publicKey`** or **`pubKey`** (P-256 SPKI Base64).
        Optional **`deviceLabel`** is stored for UX (e.g. "Chrome on MacBook"). When **`deviceId`** is omitted, the server
        assigns a new id (UUID). When **`deviceId`** is sent, the same device can re-register an updated key idempotently.
        With **`bootstrap: true`**, the response is **201** and **`RegisterDeviceBootstrapResponse`** (`deviceId` only).
        On **first insert** of a new row (not idempotent update), the server emits Socket.IO **`device:sync_requested`**
        to room **`user:<userId>`** with **`{ newDeviceId, newDevicePublicKey }`** so other connected clients can react
        (same-process delivery; not brokered).
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered (full payload; default when **`bootstrap`** is omitted or false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponse'
        '201':
          description: Bootstrap registration — request body included bootstrap true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceBootstrapResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: JSON body exceeds the smaller limit used for **`POST /users/me/devices`**
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Per-user rate limit on device registration / deletion exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/devices/sync-notify:
    post:
      operationId: notifyTrustedDeviceSyncRequest
      summary: Re-broadcast device sync request to other sessions
      description: |
        Re-emits Socket.IO **`device:sync_requested`** to **`user:<userId>`** with this device’s **`deviceId`** and **`publicKey`**
        (same payload shape as on **first insert** in **`POST /users/me/devices`**). Use when the trusted browser was offline
        when this device registered.

        Prefer an access JWT that includes **`sourceDeviceId`** (**`POST /auth/refresh`** with **`sourceDeviceId`**). If your
        token does not yet include it, send optional JSON **`{ "deviceId": "<id>" }`** — use the same **`deviceId`** as
        **`GET /users/me/devices`** for this browser. At least **two** devices must be in the registry. Rate-limited per user
        (**`DEVICE_SYNC_NOTIFY_RATE_LIMIT_*`**).
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotifyDeviceSyncRequest'
      responses:
        '200':
          description: Notification emitted (best-effort in-process Socket.IO fan-out)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Guest session — not allowed (**`GUEST_ACTION_FORBIDDEN`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device row not found for resolved device id (JWT claim or JSON body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Per-user rate limit on sync-notify exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/devices/{deviceId}:
    delete:
      operationId: deleteMyDevice
      summary: Revoke a device public key for the current user
      description: |
        **Authorization:** only the **authenticated account** may remove **its own** device rows. The path is always
        **`/users/me/...`** — there is no API to delete another user’s devices.

        Deletes the **`user_device_public_keys`** document for **`(authenticatedUserId, deviceId)`**. **204** if a row was
        removed; **404** if no matching row exists.

        **Historical messages are not updated:** existing **`Message`** documents may still contain
        **`encryptedMessageKeys[deviceId]`** for this device. Stripping those entries would require scanning and patching
        many message documents (write amplification, races with concurrent sends). The chosen tradeoff is **registry-only
        revocation**: the device no longer appears in **`GET …/devices/public-keys`**, so senders must not wrap new keys
        for it; old wrapped-key blobs remain as opaque metadata until optional future compaction. Clients must tolerate
        orphaned map entries for revoked devices when reading history.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '204':
          description: Device removed from registry
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Per-user rate limit on device register/delete exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/sync/message-keys:
    get:
      operationId: listMySyncMessageKeys
      summary: List wrapped message keys for a registered device (multi-device sync)
      description: |
        Returns **`messageId`** and this device’s **`encryptedMessageKeys[deviceId]`** for hybrid-E2EE messages in every
        conversation the user participates in. Does **not** return **`body`**, **`iv`**, or other devices’ wrapped keys.
        **`deviceId`** must match an active device row for the caller (see **`GET /users/me/devices`**).
        Pagination uses keyset order **`(createdAt ascending, id ascending)`**. Omit **`afterMessageId`** for the first page;
        when **`hasMore`** is true, pass **`nextAfterMessageId`** as **`afterMessageId`** on the next request.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
            pattern: '^[A-Za-z0-9_-]+$'
          description: Registered device id — selects **`encryptedMessageKeys[deviceId]`** on each message
        - name: afterMessageId
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: >-
            Exclusive cursor. Next page returns messages strictly after this **`Message`** **`id`** in sort order.
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Page of wrapped keys for the requested device (each row is **`SyncMessageKeyEntry`**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncMessageKeysListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: batchUploadMySyncMessageKeys
      summary: Batch-upload wrapped message keys for another registered device
      description: |
        Requires a **device-bound** access JWT (**`sourceDeviceId`** claim). Obtain it by **`POST /auth/login`** or **`POST /auth/refresh`**
        with optional **`sourceDeviceId`** in the JSON body (must match an active row from **`GET /users/me/devices`**).
        For each **`keys`** item, the server **`$set`s** **`encryptedMessageKeys[targetDeviceId]`** when the caller’s **`sourceDeviceId`**
        already has a non-empty wrapped key on that message and the user participates in the thread. Re-sending the same pair is safe (**idempotent**).
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchKeyUploadRequest'
      responses:
        '200':
          description: Counts of applied vs skipped updates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchKeyUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: JSON body exceeds the device-sync batch size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: >-
            Per-user Redis fixed-window cap on batch sync uploads exceeded (**`DEVICE_SYNC_RATE_LIMIT_*`** messaging-service env;
            stacks with **`GLOBAL_RATE_LIMIT_*`**).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/devices/public-keys:
    get:
      operationId: listUserDevicePublicKeys
      summary: List active device public keys for a user
      description: |
        Returns all registered devices for **`userId`**. **Authorization:** self, loose peer fetch, or direct-thread-only when
        **`PUBLIC_KEY_FETCH_REQUIRE_DIRECT_THREAD`** is set in messaging-service env.
      tags:
        - Users
        - 'Device sync (Feature 13)'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Device public keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePublicKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}:
    get:
      operationId: getUserById
      summary: Public profile by id (planned; authz per policy)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/search:
    get:
      operationId: searchUsers
      summary: Search users by email and/or username (substring match; not by opaque user id)
      description: |
        **Matching:** **case-insensitive substring** on the **normalized** (trim + lowercase)
        stored **`email`** and **`username`**. Results are ordered by **relevance** (best match on either field):
        **exact** match first, then **prefix**, then other substring matches; ties break by **`email`**
        ascending.

        **Query:** send **`q`** (preferred) or legacy **`email`** — same matching rules; exactly one is required.

        **Abuse controls:** query length **3–254** by default (**`USER_SEARCH_MIN_QUERY_LENGTH`** may be
        lowered to **2** only when operators accept weaker bounds); allowed charset
        **`[a-z0-9@._+_-]`** (includes **`_`** for username fragments); regex metacharacters are **escaped** server-side; response size is capped
        by **`limit`** (default **20**, max **100**); MongoDB candidate scan per request is bounded
        (**`USER_SEARCH_MAX_CANDIDATE_SCAN`**).

        **Guest directory (Feature 2a):** when the bearer identifies a **guest** (`User.guest` / JWT `guest` claim),
        the server applies **`isGuest: true`** in the user query — **registered users never appear** in results.
        **`q`** / **`email`** / **`limit`** behave the same; only the result set is restricted. **Rate limiting:** guest
        callers use **`GUEST_USER_SEARCH_RATE_LIMIT_*`** (separate Redis key **`ratelimit:users-search:guest-ip:*`**,
        typically stricter **`MAX`** than registered **`USER_SEARCH_RATE_LIMIT_*`**). Registered callers use
        **`USER_SEARCH_RATE_LIMIT_*`**. **429** **`RATE_LIMIT_EXCEEDED`** when either cap is exceeded.

        Returns username, display name, profile picture, **`guest`** flag, and the **direct conversation id** with the
        current user when a conversation already exists (null when none). The caller never
        receives their own row.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 254
          description: >
            Preferred search string (**trimmed**, lowercased). **Substring** match on stored **email** and **username**.
            Use this or **`email`** (legacy alias). Allowed characters: letters, digits, **`@._+-_`**.
        - name: email
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 254
          description: >
            Legacy alias for **`q`** — same behaviour. Provide **`q`** or **`email`** (not both required in OpenAPI;
            server requires at least one).
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many search requests from this client IP (Redis per-IP limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /conversations:
    get:
      operationId: listConversations
      summary: List direct conversations for the current user (cursor pagination; newest activity first)
      description: |
        Returns **direct 1:1** threads where the caller is a **participant**, **newest `updatedAt` first**.
        **`cursor`** is opaque (from **`nextCursor`**); malformed cursors return **400**.
      tags:
        - Conversations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{conversationId}/messages:
    get:
      operationId: listMessages
      summary: List messages in a direct 1:1 conversation (cursor pagination; participants only)
      description: |
        **Direct 1:1** threads only — **group** conversations return **403** until group messaging is implemented.
        The caller must be a **participant**; otherwise **403**. Messages are returned **newest first**.
        **`cursor`** is opaque (from **`nextCursor`**); malformed cursors return **400**.
        **Rate limiting:** the **global** REST per-IP limit (`GLOBAL_RATE_LIMIT_*` messaging-service env) applies to this route; exceeding it returns **429** with **`ErrorResponse`** (**`code`** typically **`RATE_LIMIT_EXCEEDED`**).
      tags:
        - Messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Global REST per-IP rate limit exceeded (`GLOBAL_RATE_LIMIT_*`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /conversations/{conversationId}/message-receipts:
    get:
      operationId: listMessageReceipts
      summary: List message receipt summaries for a direct 1:1 conversation (cursor pagination; participants only)
      description: |
        **Narrow receipt sync:** returns **`messageId`**, **`createdAt`**, and optional **`receiptsByUserId`** per row —
        **no** message body, **`mediaKey`**, or **`senderId`**. Use this to refresh delivery/read state without
        re-downloading full **`Message`** bodies from **`GET /conversations/{id}/messages`**.

        **`Message`** objects from **`GET /messages`** and Socket.IO **`message:new`** **do not** include receipt fields;
        combine this route with real-time **`message:delivered`** / **`message:read`** / **`conversation:read`** events.

        **Direct 1:1** only — **group** returns **403**. Same opaque **`cursor`** / **`nextCursor`** as the message list
        (**newest first**). **`readCursor`** is the authenticated user’s durable read cursor (**`conversation_reads`**),
        or **`null`** if none.
      tags:
        - Messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated receipt summaries and optional read cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageReceiptPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Global REST per-IP rate limit exceeded (`GLOBAL_RATE_LIMIT_*`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /messages:
    post:
      operationId: sendMessage
      deprecated: true
      summary: Send a message (direct 1:1; group not supported yet) — deprecated
      description: |
        **Deprecated.** Prefer the Socket.IO event **`message:send`** (same **`SendMessageRequest`**
        payload; ack returns **`Message`** or `{ code, message }`). This REST route remains supported
        for **integration tests**, **automation**, and **debugging**; production interactive clients
        should not rely on it long term.

        **`conversationId` is optional.** If omitted for a **new direct 1:1** thread, the server
        creates the conversation, then persists the message — provide **`recipientUserId`** (the
        other participant). For an existing thread, send **`conversationId`** and omit
        **`recipientUserId`**. **Group** threads return **403** until group messaging is implemented.
        Request body must include **`body`** text and/or **`mediaKey`** (validated by Zod).

        **Guest sandbox:** direct sends require **both** participants to be **guests** or **both** to be **registered** —
        guest ↔ registered pairs return **403** with **`code`** **`GUEST_MESSAGING_FORBIDDEN`** (same rule on Socket.IO **`message:send`**).

        **Rate limiting:** this route uses the **message-send** limits (**`MESSAGE_SEND_RATE_LIMIT_*`**, per user + IP)
        in addition to the **global** REST per-IP limit — **global** (`GLOBAL_RATE_LIMIT_*`) and **message-send** (`MESSAGE_SEND_RATE_LIMIT_*`) are evaluated separately. Either
        can return **429** with **`ErrorResponse`** (**`code`** **`RATE_LIMIT_EXCEEDED`**).
      tags:
        - Messages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message created (includes `conversationId`; may be newly created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: >-
            Group thread not supported, or **guest ↔ registered** messaging blocked (**`GUEST_MESSAGING_FORBIDDEN`** —
            only guest↔guest or registered↔registered direct threads).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Message-send and/or global REST rate limit exceeded (`MESSAGE_SEND_RATE_LIMIT_*`, `GLOBAL_RATE_LIMIT_*`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /groups:
    post:
      operationId: createGroup
      summary: Create a group (planned)
      tags:
        - Groups
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/upload:
    post:
      operationId: uploadMedia
      summary: Upload a file; messaging-service stores in S3 via AWS SDK (`@aws-sdk/lib-storage` Upload)
      description: |
        Multipart field **`file`**. Max size is enforced by **`MEDIA_MAX_BYTES`** on the server
        (default **100 MiB** per file for image/video; override via environment). Allowed MIME types
        are server-defined (see messaging-service implementation).
      tags:
        - Media
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Object stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /media/presign:
    get:
      operationId: getMediaPresign
      summary: Issue a short-lived pre-signed PUT URL for direct client upload (query params)
      description: |
        Same contract as **`POST /media/presign`**, with **`contentType`**, **`contentLength`**, and optional **`filename`**
        passed as **query** parameters. Prefer **`POST`** when **`filename`** or future fields might exceed URL length.
        **`contentLength`** must not exceed **`MEDIA_MAX_BYTES`** (default **100 MiB**; configurable per deployment).
      tags:
        - Media
      security:
        - bearerAuth: []
      parameters:
        - name: contentType
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/MediaPresignContentType'
        - name: contentLength
          in: query
          required: true
          description: >
            Declared **`PUT`** body size; must not exceed **`MEDIA_MAX_BYTES`** (default **100 MiB** unless the server overrides).
          schema:
            type: integer
            minimum: 1
        - name: filename
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: Pre-signed upload target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaPresignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: postMediaPresign
      summary: Issue a short-lived pre-signed PUT URL for direct client upload (JSON body)
      description: |
        Returns a pre-signed **`PUT`** URL and metadata so the browser (or native client) can upload bytes **directly**
        to object storage without streaming through messaging-service. **`contentLength`** must match the **`PUT`** body size.
        TTL is **`MEDIA_PRESIGN_TTL_SECONDS`** on the server (default **300** seconds). Allowed **`contentType`** values match **`POST /media/upload`**.
      tags:
        - Media
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaPresignRequest'
      responses:
        '200':
          description: Pre-signed upload target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaPresignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer access JWT. Optional claim **`sourceDeviceId`** on login/refresh/register/guest when a device id is supplied—needed for **`POST /users/me/sync/message-keys`**.

  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: User identifier

    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_-]+$'
      description: >-
        Device identifier (e.g. UUID from **`POST /users/me/devices`**, or **`default`** for migrated single-key rows).
        Letters, digits, underscore, hyphen only.

    ConversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
      description: Conversation identifier

    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor from a previous list response

    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: |
        Optional page size; **default `20`** when omitted on all paginated list endpoints that
        support this parameter. Server may enforce a lower cap.

  responses:
    BadRequest:
      description: Validation or malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Authenticated but not allowed for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ReadyResponse:
      type: object
      required:
        - ready
      properties:
        ready:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code
        message:
          type: string
          description: Safe client-facing message

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - username
        - displayName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9_]+$'
          description: >-
            Unique handle, stored lowercase; letters, digits, and underscores only (server normalizes case).
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name shown in the app (trimmed on the server).
        profilePicture:
          type: string
          format: uri
          nullable: true
          description: Optional avatar URL at signup (e.g. from `POST /media/upload` before register)
        status:
          type: string
          nullable: true
          maxLength: 280
          description: Optional short status line at signup
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this user, the access JWT includes **`sourceDeviceId`**.

    GuestRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9_]+$'
          description: >-
            Unique handle for the guest session; stored lowercase (same rules as register **`username`**).
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          description: Optional; may match or differ from **`username`** (trimmed on the server).
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this guest user, the access JWT includes **`sourceDeviceId`**.

    GuestAuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - user
        - tokenType
        - expiresIn
        - expiresAt
      properties:
        accessToken:
          type: string
          description: >-
            HS256 access JWT; includes a boolean **`guest`** custom claim (true for guest sessions)
        refreshToken:
          type: string
          description: Opaque refresh token (Redis); TTL matches **`GUEST_REFRESH_TOKEN_TTL_SECONDS`** for guests
        user:
          $ref: '#/components/schemas/User'
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Access token lifetime in seconds (same window as **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** for guests)
        expiresAt:
          type: string
          format: date-time
          description: Absolute UTC expiry of the access token (for UI countdown)

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Signed JWT from registration or resend

    VerifyEmailResponse:
      type: object
      required:
        - user
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
          description: Access JWT for the verified session
        refreshToken:
          type: string
          description: Opaque refresh token (stored in Redis)
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Access token lifetime in seconds

    ResendVerificationRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResendVerificationResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    UpdateProfileRequest:
      type: object
      description: Multipart parts — all optional; include at least one field to change
      properties:
        file:
          type: string
          format: binary
          description: New profile image (image/*); stored server-side; `profilePicture` URL returned on `User`
        status:
          type: string
          maxLength: 280
          description: New status text (omit to leave unchanged)
        displayName:
          type: string
          description: New display name (omit to leave unchanged)

    UpdateProfileJsonRequest:
      type: object
      description: JSON PATCH /users/me — at least one field; do not send profilePicture and profilePictureMediaKey together
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          nullable: true
          maxLength: 280
        profilePicture:
          type: string
          nullable: true
          format: uri
          maxLength: 2048
        profilePictureMediaKey:
          type: string
          minLength: 1
          maxLength: 1024

    AvatarPresignContentType:
      type: string
      enum:
        - image/jpeg
        - image/png
        - image/webp
        - image/gif

    AvatarPresignRequest:
      type: object
      required:
        - contentType
        - contentLength
      properties:
        contentType:
          $ref: '#/components/schemas/AvatarPresignContentType'
        contentLength:
          type: integer
          minimum: 1
        filename:
          type: string
          maxLength: 128

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this user, the access JWT includes **`sourceDeviceId`** for device-bound APIs.

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
        sourceDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            When set and registered for this user, the new access JWT includes **`sourceDeviceId`**.

    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
          description: Signed JWT from forgot-password email
        password:
          type: string
          format: password
          minLength: 8

    NotifyDeviceSyncRequest:
      type: object
      additionalProperties: false
      properties:
        deviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
          description: >-
            Include when the Bearer token does not embed sourceDeviceId — use this browser’s device id from GET /users/me/devices.

    OkResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    AuthResponse:
      type: object
      required:
        - tokenType
      properties:
        accessToken:
          type: string
          nullable: true
          description: null after register when email verification is pending; otherwise HS256 JWT
        refreshToken:
          type: string
          nullable: true
          description: Opaque refresh token (Redis); null when access token is not issued
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          nullable: true
          description: >-
            null when accessToken is null; otherwise access token lifetime in seconds. Guest sessions use
            **`GUEST_ACCESS_TOKEN_TTL_SECONDS`** (default **1800**); registered users use **`ACCESS_TOKEN_TTL_SECONDS`**.
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            null when accessToken is null. When present (e.g. guest **`POST /auth/refresh`**), absolute UTC expiry of the
            access token — same semantics as **`GuestAuthResponse.expiresAt`**.

    User:
      type: object
      required:
        - id
        - guest
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          nullable: true
          description: Null for guest accounts (no email stored)
        username:
          type: string
          nullable: true
          minLength: 3
          maxLength: 30
          description: Unique handle (null for legacy accounts predating usernames)
        displayName:
          type: string
          nullable: true
        emailVerified:
          type: boolean
          description: >-
            Present on every **`User`**. Meaning depends on deployment: when **`EMAIL_VERIFICATION_REQUIRED`** is **`true`**
            (messaging-service env), new users may be **`false`** until **`POST /auth/verify-email`** succeeds; when **`false`**,
            registration typically sets this to **`true`** immediately (**`EMAIL_VERIFICATION_REQUIRED`** in messaging-service env).
        profilePicture:
          type: string
          format: uri
          nullable: true
          description: HTTPS URL or CDN URL for avatar (or null if unset)
        status:
          type: string
          nullable: true
          maxLength: 280
          description: Short user-defined status line
        guest:
          type: boolean
          description: >-
            True for temporary guest sandbox accounts (POST /auth/guest); false for full registrations.

    UserPublic:
      type: object
      required:
        - id
        - guest
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
          description: Normalized handle for display when displayName is unset (guest and registered).
        displayName:
          type: string
          nullable: true
        profilePicture:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          nullable: true
          maxLength: 280
        guest:
          type: boolean
          description: True for guest sandbox accounts (POST /auth/guest).

    RegisterDeviceRequest:
      type: object
      additionalProperties: false
      description: |
        Register or update one device — **never** include a private key. Supply **`publicKey`** *or* **`pubKey`**
        (same P-256 SPKI Base64 rules); if both are sent they must be identical.
      properties:
        publicKey:
          type: string
          maxLength: 2048
          description: P-256 SubjectPublicKeyInfo (SPKI), Base64-encoded (device registration; same rules as **`pubKey`**).
        pubKey:
          type: string
          maxLength: 2048
          description: Alias for **`publicKey`** (bootstrap / mobile naming)
        deviceLabel:
          type: string
          maxLength: 200
          nullable: true
          description: Optional human-readable label (e.g. "Chrome on MacBook")
        deviceId:
          type: string
          maxLength: 128
          description: >-
            Optional client-chosen id so the same physical device can re-register; when omitted the server assigns a new id
        bootstrap:
          type: boolean
          description: >-
            When true, HTTP **201** with **`RegisterDeviceBootstrapResponse`** (only **`deviceId`** in the JSON body).

    RegisterDeviceBootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - deviceId
      description: >-
        Returned for **`POST /users/me/devices`** when the request sets **`bootstrap`** to true.
      properties:
        deviceId:
          type: string
          description: Server-assigned or client-supplied device id for this row

    RegisterDeviceResponse:
      type: object
      required:
        - deviceId
        - publicKey
        - keyVersion
        - createdAt
        - updatedAt
      properties:
        deviceId:
          type: string
        publicKey:
          type: string
        keyVersion:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DevicePublicKeyEntry:
      type: object
      required:
        - deviceId
        - publicKey
        - keyVersion
        - createdAt
        - updatedAt
      properties:
        deviceId:
          type: string
        publicKey:
          type: string
        keyVersion:
          type: integer
          minimum: 1
          description: Monotonic per **`(userId, deviceId)`** row; increments when the device re-registers a new SPKI
        deviceLabel:
          type: string
          maxLength: 200
          nullable: true
          description: Present when the device was registered with a label
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DevicePublicKeyListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DevicePublicKeyEntry'

    DeviceListItem:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - deviceLabel
        - createdAt
        - lastSeenAt
        - publicKey
      properties:
        deviceId:
          type: string
          description: Server-assigned or client-supplied device id for this row
        deviceLabel:
          type: string
          nullable: true
          maxLength: 200
          description: Human-readable label when set; otherwise null
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
          description: >-
            Last activity recorded for this row (e.g. device re-registration). Legacy rows without a stored value use **`updatedAt`**.
        publicKey:
          type: string
          maxLength: 2048
          description: P-256 ECDH public key (**SPKI** DER, standard Base64) for this device row — same material as **`POST /users/me/devices`**.

    DeviceListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      description: Response body for **`GET /users/me/devices`** — caller-owned device rows including **`publicKey`** for hybrid E2EE and sync verification
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeviceListItem'

    SyncMessageKeyEntry:
      type: object
      additionalProperties: false
      required:
        - messageId
        - encryptedMessageKey
      description: One wrapped symmetric key for a single message and device (GET sync list or **`BatchKeyUploadRequest.keys`** item)
      properties:
        messageId:
          type: string
          maxLength: 200
          description: >-
            Stable **`Message`** primary key (**`id`** field) for the row that contains this wrapped key.
        encryptedMessageKey:
          type: string
          maxLength: 131072
          description: >-
            Opaque wrapped symmetric key for the requested device (same storage semantics as **`Message.encryptedMessageKeys`** values).

    SyncMessageKeysListResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - hasMore
        - nextAfterMessageId
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SyncMessageKeyEntry'
        hasMore:
          type: boolean
        nextAfterMessageId:
          type: string
          nullable: true
          description: >-
            When **`hasMore`** is true, set **`afterMessageId`** on the next request to this value. Otherwise null.

    RegisteredDeviceIdWire:
      type: string
      maxLength: 128
      pattern: '^[A-Za-z0-9_-]+$'
      description: Device id as stored in **`user_device_public_keys`** (e.g. UUID or **`default`**)

    BatchKeyUploadRequest:
      type: object
      additionalProperties: false
      required:
        - targetDeviceId
        - keys
      description: Body for **`POST /users/me/sync/message-keys`** — each **`keys`** element matches **`SyncMessageKeyEntry`**
      properties:
        targetDeviceId:
          $ref: '#/components/schemas/RegisteredDeviceIdWire'
        keys:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/SyncMessageKeyEntry'

    BatchKeyUploadResponse:
      type: object
      additionalProperties: false
      required:
        - applied
        - skipped
      description: Result counts for **`POST /users/me/sync/message-keys`**
      properties:
        applied:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0

    UserSearchResult:
      type: object
      required:
        - userId
        - guest
      description: One row from user search — includes existing direct conversation when present
      properties:
        userId:
          type: string
          description: Internal user id for messaging / `recipientUserId`
        username:
          type: string
          nullable: true
          description: Unique handle when set; null for legacy users
        displayName:
          type: string
          nullable: true
        profilePicture:
          type: string
          format: uri
          nullable: true
        conversationId:
          type: string
          nullable: true
          description: Direct conversation id between searcher and this user if it exists; null if first contact
        guest:
          type: boolean
          description: Whether this row is a guest sandbox user (directory filtering for guest callers)

    Conversation:
      type: object
      required:
        - id
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        isGroup:
          type: boolean
        peerUserId:
          type: string
          nullable: true
          description: |
            **Direct 1:1** — the other participant's user id (not the authenticated user). **Null** for group
            threads when group messaging exists; list responses currently return **direct** rows only.
        memberIds:
          type: array
          items:
            type: string
          description: |
            **Group** threads — **participant user ids** (including the caller) when the group is materialized;
            omit for **direct** 1:1. Clients use this for **aggregate receipt** UI (all delivered / all seen).
        updatedAt:
          type: string
          format: date-time

    ConversationPage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    MessageReceiptEntry:
      type: object
      description: |
        Per-recipient **delivered** / **seen** timestamps (**Feature 12**). Map keys are **`userId`** strings.
        Exposed on **`MessageReceiptSummary.receiptsByUserId`** and via Socket.IO receipt events — **not** on **`Message`**.
        Group **read-up-to** may also materialize **`conversation_reads`** durable cursors alongside per-message receipts.
      properties:
        deliveredAt:
          type: string
          format: date-time
          description: When the recipient client positively acknowledged delivery (in-app).
        seenAt:
          type: string
          format: date-time
          description: When the recipient read the message (per-message materialization).

    Message:
      type: object
      required:
        - id
        - conversationId
        - senderId
        - createdAt
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        body:
          type: string
          nullable: true
          description: |
            **Text or opaque E2EE payload.** Plain UTF-8 text, or **AES-256-GCM** ciphertext of the **inner** UTF-8
            plaintext when hybrid E2EE is enabled (AES-GCM of the inner UTF-8 payload). For **attachments with hybrid E2EE**,
            that inner plaintext is a small **JSON** object (**v1**) holding caption + **`m.k`** (object storage key) so the
            server never learns the key — **`mediaKey`** below is **null** on the wire. Legacy / non-E2EE sends may use
            plaintext **`body`** + optional cleartext **`mediaKey`**. The server **stores and routes** **`body`** **without**
            decrypting. Use **`encryptedMessageKeys`** + **`iv`** with device-key APIs (`POST /users/me/devices`,
            `GET /users/{userId}/devices/public-keys`) after **Prerequisite — User keypair** (register devices and expose public keys for wrapping).
        mediaKey:
          type: string
          nullable: true
          description: |
            S3 object key for an attachment when **not** using hybrid E2EE, or when the client still uses the legacy
            cleartext path. When **`encryptedMessageKeys`** + **`algorithm`** are present (**Feature 11** hybrid), the
            server **must** persist **`null`** here — the media locator lives only inside opaque **`body`** ciphertext.
        encryptedMessageKeys:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: >-
            Per-device wrapped symmetric keys (**deviceId** → opaque base64). Omitted for plaintext messages; when present, pairs with ciphertext **body**, **`iv`**, and **`algorithm`** per hybrid E2EE.
        iv:
          type: string
          nullable: true
          description: AES-GCM IV/nonce for **`body`** when E2EE — opaque to the server
        algorithm:
          type: string
          nullable: true
          maxLength: 256
          description: |
            Client-only tag naming the E2EE scheme (e.g. **`aes-256-gcm+p256-hybrid-v1`** for hybrid
            **`body`** + **`encryptedMessageKeys`**). The server stores this **without** interpreting or validating it.
        createdAt:
          type: string
          format: date-time
      description: |
        Chat row without receipt fields. **Delivery/read state** — **`GET /conversations/{conversationId}/message-receipts`**
        and Socket.IO **`message:delivered`** / **`message:read`** / **`conversation:read`**.

    MessageReceiptSummary:
      type: object
      required:
        - messageId
        - conversationId
        - createdAt
      description: |
        Receipt-related fields for one message — **no** **`body`**, **`mediaKey`**, or **`senderId`**.
      properties:
        messageId:
          type: string
        conversationId:
          type: string
        createdAt:
          type: string
          format: date-time
        receiptsByUserId:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MessageReceiptEntry'
          description: Omitted when no receipt data is stored for this message.

    ConversationReadCursor:
      type: object
      required:
        - lastReadMessageId
        - lastReadAt
      description: |
        Authenticated user’s **read-up-to** cursor for this conversation (**`conversation_reads`**).
      properties:
        lastReadMessageId:
          type: string
        lastReadAt:
          type: string
          format: date-time

    MessageReceiptPage:
      type: object
      required:
        - items
        - hasMore
        - readCursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MessageReceiptSummary'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
        readCursor:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ConversationReadCursor'
          description: >
            JSON null when the user has no stored read cursor for this thread.

    MessagePage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    SendMessageRequest:
      type: object
      description: |
        **Direct 1:1 — new thread:** omit `conversationId`, set `recipientUserId`. **Direct 1:1 —
        existing thread:** set `conversationId`, omit `recipientUserId`. **Group:** set
        `conversationId` for the group.
      properties:
        conversationId:
          type: string
          nullable: true
          description: Existing conversation; omit to create a new direct conversation (see `recipientUserId`)
        recipientUserId:
          type: string
          nullable: true
          description: Other user when starting a new direct thread; omit when `conversationId` is set
        body:
          type: string
          description: |
            **Message body text or opaque E2EE ciphertext** — same semantics as **`Message.body`** (server does not decrypt).
            Hybrid sends with attachments encrypt a **v1 JSON** inner form (caption + **`m.k`**) — same semantics as **`Message.body`**.
            When sending E2EE payloads, clients **depend on** user public-key directory APIs and **Prerequisite — User keypair**
            (device registration, **`encryptedMessageKeys`** wrapping, and device sync as defined in this spec).
        mediaKey:
          type: string
          nullable: true
          description: |
            From prior upload response. **Omit or send null** when using hybrid E2EE with attachments — the server drops
            this field for hybrid envelopes (server persists **`null`**; media locator only inside opaque **body** ciphertext).
        encryptedMessageKeys:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Hybrid E2EE — per-device wrapped message keys; server stores opaquely
        iv:
          type: string
          nullable: true
          description: AES-GCM IV for **`body`** when using **`encryptedMessageKeys`**
        algorithm:
          type: string
          nullable: true
          maxLength: 256
          description: |
            Same semantics as **`Message.algorithm`** — required when **`encryptedMessageKeys`** is non-empty.

    Group:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        createdBy:
          type: string

    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        memberIds:
          type: array
          items:
            type: string

    MediaUploadResponse:
      type: object
      required:
        - key
        - bucket
      properties:
        key:
          type: string
        bucket:
          type: string
        url:
          type: string
          format: uri
          nullable: true
          description: Optional HTTPS URL for display if bucket policy allows

    MediaPresignContentType:
      type: string
      description: Same allowlist as **`POST /media/upload`** (images and short videos).
      enum:
        - image/jpeg
        - image/png
        - image/webp
        - image/gif
        - video/mp4
        - video/webm
        - video/quicktime
        - video/ogg

    MediaPresignRequest:
      type: object
      required:
        - contentType
        - contentLength
      properties:
        contentType:
          $ref: '#/components/schemas/MediaPresignContentType'
        contentLength:
          type: integer
          minimum: 1
          description: >
            Must equal the **`PUT`** body length when uploading to the pre-signed URL, and must not exceed
            **`MEDIA_MAX_BYTES`** (default **100 MiB** per deployment unless overridden).
        filename:
          type: string
          maxLength: 128
          description: Optional hint for the object key suffix; sanitized server-side.

    MediaPresignResponse:
      type: object
      required:
        - method
        - url
        - key
        - bucket
        - expiresAt
        - headers
      properties:
        method:
          type: string
          enum:
            - PUT
        url:
          type: string
          format: uri
          description: Pre-signed URL — **`PUT`** the object bytes here.
        key:
          type: string
        bucket:
          type: string
        expiresAt:
          type: string
          format: date-time
          description: Approximate wall-clock expiry ( **`MEDIA_PRESIGN_TTL_SECONDS`** after issuance ).
        headers:
          type: object
          additionalProperties:
            type: string
          description: >-
            Headers the client must send on **`PUT`** (e.g. **`Content-Type`**, **`Content-Length`**) so the signature matches.
