# Reverse proxy for messaging-service (REST + Socket.IO + Swagger UI).
# Entry: http://localhost:8080 (see docker-compose port mapping).
#
# X-Forwarded-For / X-Real-IP: messaging-service uses getClientIp() + trust proxy (1 hop) for
# Redis rate limits — see README.md (Configuration). Do not add tight limit_req here
# unless intentional (stacks with app GLOBAL_RATE_LIMIT_*).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream messaging_backend {
    server messaging-service:3000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    location / {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
