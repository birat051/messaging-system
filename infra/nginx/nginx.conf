# SPA from **web-client** **`dist/`** (mounted at **`/usr/share/nginx/html`**) + reverse proxy for
# messaging-service (**`/v1`**, **`/socket.io`**, **`/api-docs`**).
# Entry: http://localhost:8080 (see docker-compose port mapping). Build **`dist/`** first:
#   cd apps/web-client && npm run build
#
# X-Forwarded-For / X-Real-IP: messaging-service uses getClientIp() + trust proxy (1 hop) for
# Redis rate limits — see README.md (Configuration). Do not add tight limit_req here
# unless intentional (stacks with app GLOBAL_RATE_LIMIT_*).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream messaging_backend {
    server messaging-service:3000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # Allow thread images from public object URLs (MinIO/S3) while keeping scripts same-origin.
    # Adjust if you add stricter **`script-src`** (hashed bundles) in the web-client build.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; connect-src 'self' https: http: ws: wss:; font-src 'self' data:; base-uri 'self'; form-action 'self';" always;

    root /usr/share/nginx/html;
    index index.html;

    # REST API — match **`/v1`** and **`/v1/...`** but not **`/v1extra`**.
    location ~ ^/v1(/|$) {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /socket.io/ {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /api-docs {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
