# Run from repository root:
#   docker compose -f infra/docker-compose.yml up -d
# Build web-client static assets first (nginx serves apps/web-client/dist/):
#   cd apps/web-client && npm ci && npm run build
# API (via nginx): http://localhost:8080  —  Swagger: http://localhost:8080/api-docs
# Direct app on host **3001** (not 3000) so local `npm run dev` can keep using 3000.
# WebRTC STUN/TURN (coturn, optional profile **turn**):
#   docker compose -f infra/docker-compose.yml --profile turn up -d
#   - 3478/tcp+udp  STUN + TURN; 49152-49200/udp  relay (see README.md — WebRTC: ports and ICE).
#   WSS: serve the SPA/API over HTTPS so Socket.IO uses wss:// — nginx TLS is backlog (TASK_CHECKLIST).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-messaging}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-messaging}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data

  messaging-service:
    build:
      context: ..
      dockerfile: apps/messaging-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MONGODB_URI: mongodb://mongo:27017/messaging
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-messaging}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-messaging}:${RABBITMQ_PASS:-messaging}@rabbitmq:5672
      OPENAPI_SPEC_PATH: /app/openapi/openapi.yaml
      S3_BUCKET: ${S3_BUCKET:-messaging-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000}
      # MinIO objects are private by default; this allows `<img src>` to `S3_PUBLIC_BASE_URL` / bucket / key.
      S3_ANONYMOUS_GET_OBJECT: ${S3_ANONYMOUS_GET_OBJECT:-true}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-for-production}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:-}
      EMAIL_VERIFICATION_WEB_PATH: ${EMAIL_VERIFICATION_WEB_PATH:-/verify-email}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      PASSWORD_RESET_TOKEN_TTL_HOURS: ${PASSWORD_RESET_TOKEN_TTL_HOURS:-1}
      PASSWORD_RESET_WEB_PATH: ${PASSWORD_RESET_WEB_PATH:-/reset-password}
      # SOCKET_IO_REDIS_ADAPTER: "true"   # discouraged — rooms are in-memory; use RabbitMQ per replica (PROJECT_PLAN §3.2.2)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/web-client/dist:/usr/share/nginx/html:ro
    depends_on:
      messaging-service:
        condition: service_healthy

  coturn:
    image: coturn/coturn:4.6
    profiles:
      - turn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf", "--log-file=stdout"]

volumes:
  mongo-data:
  rabbitmq-data:
  minio-data:
