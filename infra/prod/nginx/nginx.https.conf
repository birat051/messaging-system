# PC-4 (3) — **TLS** for **`ekko.biratbhattacharjee.com`** (after `certonly` in PC-4 (2)).
# Prereq: files under `/etc/letsencrypt/live/ekko.biratbhattacharjee.com/` (mount read-only, see `docker-compose.app.yml`).
# In compose, switch **`default.conf`** from **`nginx.acme-http.conf`** to this file, add **`443:443`**, and
# mount **`certbot-letsencrypt:/etc/letsencrypt:ro`**, then recreate nginx or: **`docker compose exec nginx nginx -s reload`**
# (config-only change; certificates renewed in place on the same volume work the same way).
# **Port 80 (ekko):** HTTP-01 challenge path only; all other requests → **301** to `https://$host$request_uri`.
# **Port 80 (localhost / 127.0.0.1):** full SPA + API over HTTP (healthchecks, local smoke) — not TLS.
# **Port 443:** same proxy shape as the ACME **HTTP** config, with `X-Forwarded-Proto: https` for the app.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream messaging_backend {
    server messaging-service:3000;
}

# --- :80 for the public host name: ACME + redirect to HTTPS -----------------------------
server {
    listen 80;
    server_name ekko.biratbhattacharjee.com;
    client_max_body_size 25m;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- :80 for loopback: keep HTTP so `wget`/curl on 127.0.0.1:8080 still work in Docker ----
server {
    listen 80;
    server_name localhost 127.0.0.1;
    client_max_body_size 25m;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; connect-src 'self' https: http: ws: wss:; font-src 'self' data:; base-uri 'self'; form-action 'self';" always;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/v1(/|$) {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /socket.io/ {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /api-docs {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- :443 for ekko (TLS) -------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name ekko.biratbhattacharjee.com;
    client_max_body_size 25m;

    ssl_certificate     /etc/letsencrypt/live/ekko.biratbhattacharjee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ekko.biratbhattacharjee.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; connect-src 'self' https: http: ws: wss:; font-src 'self' data:; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/v1(/|$) {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /socket.io/ {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /api-docs {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
