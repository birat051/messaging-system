# PC-4 (1) — HTTP-only, ACME-ready for **Let’s Encrypt HTTP-01** (use until your first `certonly` works).
# Use with `infra/prod/docker-compose.app.yml` (mount as `default.conf`). **No** `listen 443` here — PC-4 (3) switches the mount to **`nginx.https.conf`**
# after `certonly`, then `docker compose up -d` or `nginx -s reload`.
#
# **server_name:** primary **`ekko.biratbhattacharjee.com`**; **`localhost`** so `curl http://127.0.0.1:8080/...` works when mapped
# to port **8080** with `Host: localhost` (set **`-H 'Host: ekko...'`** when testing ACME paths as LE would).
#
# **Webroot:** challenge files live under volume **`certbot-www` → `/var/www/certbot`** (see compose). Certbot:
#   certbot certonly --webroot -w /var/www/certbot -d ekko.biratbhattacharjee.com
# (from a container sharing the same volume, or equivalent).
#
# To use the plain dev config without ACME (same as monolith proxy shape, `server_name _`),
# mount **`infra/dev/nginx/nginx.conf`** instead of this file. For **TLS** on the prod host, see **`nginx.https.conf`**.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream messaging_backend {
    server messaging-service:3000;
}

server {
    listen 80;
    server_name ekko.biratbhattacharjee.com localhost;
    client_max_body_size 25m;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; connect-src 'self' https: http: ws: wss:; font-src 'self' data:; base-uri 'self'; form-action 'self';" always;

    # HTTP-01 — must use ^~ so it is not overridden by `location /`
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/v1(/|$) {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /socket.io/ {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /api-docs {
        proxy_pass http://messaging_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
