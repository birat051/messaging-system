# App plane (RabbitMQ, messaging-service, nginx) — prod / split-stack; **no** MinIO here (PC-1 / data host).
#
# **Deploy / bring-up (static assets):** **`nginx`** bind-mounts **`../../apps/web-client/dist` → `/usr/share/nginx/html`** (paths relative
# to this `infra/prod/` directory). The directory must exist and contain a production **Vite** build **before** nginx starts, or
# the SPA will be empty / 404. From repo root:
#   1) cd apps/web-client && npm ci && npm run build
#   2) docker compose -f infra/prod/docker-compose.app.yml up -d --build
# Re-run step (1) after UI changes; restart **nginx** (or `compose up` again) to pick up new **`dist/`** files.
# API (via nginx): http://localhost:8080 — Swagger: http://localhost:8080/api-docs
# Set **MONGODB_URI**, **REDIS_URL**, **S3_*** to reach the **data** host — see `infra/prod/.env.app.example` and `docs/prod-s3-and-r2.md`.
# Cross-stack networking (shared network vs two hosts): `docs/prod-networking.md`.
# Secrets: use repo-root `.env` (or `--env-file`); never commit. See `docs/prod-secrets.md`.
# **PC-4 ACME + TLS:** (1) `nginx` uses **`nginx.acme-http.conf`** + **`certbot-www`**. (2) **Certbot** webroot: `docs/prod-acme-nginx.md`, `infra/prod/scripts/certbot-webroot-ekko.sh`.
# (3) After **`certonly`**, switch the **`default.conf`** mount to **`./nginx/nginx.https.conf`**, `docker compose up -d` (or `exec nginx nginx -s reload` after a config edit). **`nginx.https.conf`** = **`listen 443 ssl`** + **`/etc/letsencrypt/live/ekko...`**, and port **80** on **`ekko`** = ACME + **301** to **https** (loopback still serves HTTP on :80 for health).
# **S3**: `S3_ENDPOINT` = URL the **messaging-service** container uses to talk to MinIO (not `minio:9000` unless shared network).
# `S3_PUBLIC_BASE_URL` (and optional `S3_PRESIGN_ENDPOINT` via `.env`) = origin the **browser** uses for presigned PUT / public object URLs — often a public or VPN-reachable data-host URL, not `host.docker.internal`.
# If data services run on the same machine, defaults use `host.docker.internal` (Docker Desktop); Linux may need `extra_hosts`.
#
# **Health & order:** **`messaging-service`** only **`depends_on: rabbitmq`** (local). There is no **depends_on** for Mongo, Redis, or
# MinIO — they are remote. Start the **data** stack first (`infra/prod/docker-compose.data.yml` on the data host), confirm connectivity, then
# start this file with **`MONGODB_URI` / `REDIS_URL` / `S3_***` pointing at that host. **Smoke:** after **PC-4** TLS on **nginx**,
# `curl -fsS 'https://ekko.biratbhattacharjee.com/v1/ready'`. **HTTP-only** staging: `http://localhost:8080/v1/ready` (or host IP) before TLS.

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-messaging}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-messaging}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  messaging-service:
    # `depends_on` is only local services (RabbitMQ). Mongo, Redis, MinIO are reached via `MONGODB_URI`, `REDIS_URL`, `S3_*` — no compose link.
    build:
      context: ../..
      dockerfile: apps/messaging-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/messaging}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-messaging}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-messaging}:${RABBITMQ_PASS:-messaging}@rabbitmq:5672
      OPENAPI_SPEC_PATH: /app/openapi/openapi.yaml
      S3_BUCKET: ${S3_BUCKET:-messaging-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://host.docker.internal:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      # Browser-visible MinIO/S3 API (align with web-client VITE_S3_PUBLIC_BASE_URL). Split-stack: use data host IP/DNS :9000 if clients can reach it.
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000}
      # Optional: override only for presign PUT host (see messaging-service s3Client). Set in `.env` when needed, not duplicated here.
      S3_ANONYMOUS_GET_OBJECT: ${S3_ANONYMOUS_GET_OBJECT:-true}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-for-production}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:-https://ekko.biratbhattacharjee.com}
      EMAIL_VERIFICATION_WEB_PATH: ${EMAIL_VERIFICATION_WEB_PATH:-/verify-email}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      PASSWORD_RESET_TOKEN_TTL_HOURS: ${PASSWORD_RESET_TOKEN_TTL_HOURS:-1}
      PASSWORD_RESET_WEB_PATH: ${PASSWORD_RESET_WEB_PATH:-/reset-password}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # Public: map **80:80** + **443:443** when Let’s Encrypt / browsers hit the host. Local dev often uses **8080:80** only.
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      # PC-4: start with `nginx.acme-http.conf` until `certonly`; then use `nginx.https.conf` (see file header in that file).
      - ./nginx/nginx.acme-http.conf:/etc/nginx/conf.d/default.conf:ro
      # SPA: run `npm run build` in apps/web-client first (see file header).
      - ../../apps/web-client/dist:/usr/share/nginx/html:ro
      - certbot-www:/var/www/certbot:ro
      # PC-4 (3): read-only; required when the active config is `nginx.https.conf` (can stay mounted for ACME-only too).
      - certbot-letsencrypt:/etc/letsencrypt:ro
    depends_on:
      messaging-service:
        condition: service_healthy
    # PC-4 (2): **`certbot` run** can wait on `nginx: service_healthy`. If **wget** is missing, use a tiny derived image with **wget** or change `test` to **`nginx -t`**.
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1/",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # PC-4 (2): use **`docker compose run`** (not **`--standalone`**) so **nginx** keeps **:80**. Issue: `infra/prod/scripts/certbot-webroot-ekko.sh` or
  #   docker compose -f infra/prod/docker-compose.app.yml run --rm --profile certbot certbot certonly --webroot -w /var/www/certbot -d ekko.biratbhattacharjee.com ...
  # Default **`command: --version`** is for a harmless one-shot if you accidentally `up --profile certbot` — `run` overrides the command. Wildcard: use **DNS-01** (not this webroot service).
  certbot:
    image: certbot/certbot:v2.11.0
    profiles: ["certbot"]
    user: "0:0"
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - certbot-www:/var/www/certbot:rw
      - certbot-letsencrypt:/etc/letsencrypt
    restart: "no"
    command: ["--version"]

volumes:
  rabbitmq-data:
  # Shared with a **certbot** one-shot or sidecar: `certbot certonly --webroot -w /var/www/certbot` (same path inside certbot).
  certbot-www:
  # Certificates for PC-4 (3) — mount read-only on **nginx** when **TLS** is enabled.
  certbot-letsencrypt:
