# Dev-only TURN for local WebRTC testing. Do not use in production as-is.
# Prod / public IP: use `turnserver.prod.template` + `docker-entrypoint-coturn-prod.sh` via `infra/prod/docker-compose.data.yml`.
# Ports and web-client env: README.md (section "WebRTC: ports and ICE"); monolith Compose: --profile turn
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
min-port=49152
max-port=49200
realm=local
server-name=local
lt-cred-mech
user=dev:turnsecret
no-cli
no-tls
no-dtls
verbose
